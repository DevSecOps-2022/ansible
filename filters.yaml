- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible
    tagname: 
      name: DevSecOps with AIOps
      Project: Roboshop
      Environment: Dev
    full_name: "Hanumanth Reddy N"
    ip_address: 65.98.67.98
    tag_list:
      [
            {
                "key": "name",
                "value": "DevSecOps with AIOps"
            },
            {
                "key": "Project",
                "value": "Roboshop"
            },
            {
                "key": "Environment",
                "value": "Dev"
            }
        ]
                      
  tasks:
  - name: convert string to list
    debug:
      msg:
      -  "Before Conversion:{{topics | type_debug}}"
      -  "{{topics | split(',')}}"
      - "After Conversion: {{topics | split(',') | type_debug}}"
  
  - name: set default values
    debug:
        msg: "{{ GREETINGS | default ('Good Moring bubu')}}"
    
  - name: convert map to list
    debug:
      msg:
      - "Before conversion: {{ tagname | type_debug }}"
      - "{{ tagname | dict2items}}"
      - "After conversion: {{ tagname | dict2items | type_debug}}"

  - name: convert list to map
    debug:
      msg:
      - "Before conversion: {{ tag_list | type_debug}}"
      - "{{ tag_list | items2dict}}"
      - "After conversion: {{ tag_list | items2dict | type_debug}}"
  
  - name: conver to upper case
    debug:
      msg: "{{ full_name | upper}}"
  
  - name: convert to lower case
    debug: 
      msg: "{{ full_name | lower}}"

  - name: check ipv4 address
    debug:
      msg: "{{ ip_address | ansible.utils.ipv4}}"