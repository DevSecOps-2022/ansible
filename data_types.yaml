- name : Course information
  hosts: local
  connection: local
  vars:
    course: "DevSecOps with AIOps"
    duration_in_hours: 150
    is_live_sessions: true
    topics:
    - Linux
    - Shell
    - Ansible
    more_details:
      months: "5"
      trainer: "Siva"
  tasks:
    - name: Display course information & Data types
      debug:
        msg: 
        - "name: {{course}}"
        - "type: {{ course | type_debug }}"

    - name: Display course information & Data types
      debug:
        msg:
        - "duration: {{duration_in_hours}}"
        - "type: {{ duration_in_hours | type_debug }}"

    - name: Display course information & Data types
      debug:
        msg:
        - "is_it_live: {{ is_live_sessions }}"
        - "type: {{ is_live_sessions | type_debug }}"
    
    - name: Display course information & Data types
      debug:
        msg:
        - "topics: {{ topics }}"
        - "type: {{ topics | type_debug }}"
    
    - name: Display course information & Data types
      debug:
        msg:
        - "more_details: {{ more_details }}"
        - "type: {{more_details | type_debug }}"

          