- name: Check and print the OS information of the target host
  hosts: frontend
  tasks:
    - name: Print the OS information
      debug:
        msg: "The OS information of the target host is Redhat"
      when: ansible_facts.os_family == "RedHat"
    
    - name: Print the OS information
      debug:
        msg: "The OS information of the target host is Ubuntu"
      when: ansible_facts.os_family == "Debian"