- name: sample playbook for error handling
  hosts: local
  connection: local
  become: true
  tasks:
    - name: check roboshop user exists
      command: id roboshop
      register: user_check
      ignore_errors: true
    
    - name: print user_check output
      debug:
        msg: "{{user_check}}"

    # - name: create roboshop user
    #   command: useradd roboshop
    #   when: user_check.rc != 0

# creating user using user module instead of command module
    - name: create roboshop user
      user:
        name: roboshop
      when: user_check.rc != 0
